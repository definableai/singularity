# Prod-shaped compose: api + worker + beat only — PG/Redis are external managed services.
# Deploy contract first (never entrypoint magic):
#   uv run sg db migrate && uv run sg script run --pending
services:
  api:
    build: .
    env_file: .env
    ports: ["8000:8000"]
    # 1-2 workers per container, scale by replicas: container liveness restarts cover a
    # wedged event loop (uvicorn has no hung-worker reaper — plan 01)

  worker:
    build: .
    env_file: .env
    command: ["uv", "run", "worker"]
    # queue routing: add a second worker with -Q heavy for @task(queue="heavy")

  beat:
    build: .
    env_file: .env
    command: ["uv", "run", "worker", "--beat"]
    deploy:
      replicas: 1  # beat MUST be single-replica — duplicate schedulers = duplicate tasks
