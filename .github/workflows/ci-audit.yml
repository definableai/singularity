name: CI Audit

# Reusable workflow: dependency CVE audit. Called by ci.yml.
#
# Advisory — reports findings without blocking the merge. Make it blocking once an
# allowlist exists for accepted risks.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python + uv
        uses: ./.github/actions/setup-python-env
        with:
          save-cache: false # ci-lint.yml writes it

      - name: Audit dependencies
        continue-on-error: true
        run: uv run --with pip-audit pip-audit --strict
