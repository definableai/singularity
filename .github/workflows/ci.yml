name: CI

# Orchestrator. Each suite is a reusable workflow in .github/workflows/ci-*.yml;
# shared setup is the composite action in .github/actions/setup-python-env.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual re-trigger from the UI or `gh workflow run`, for when a run is lost to a
  # cancellation or an infra blip and main's HEAD is left without one.
  workflow_dispatch:

# Any permissions block resets unlisted scopes to none. CI only reads the repo.
permissions:
  contents: read

# Supersede a PR's in-flight run on a new push; never cancel or queue main — a unique
# group per main run means there is nothing to collide with.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_id || github.ref }}
  cancel-in-progress: true

jobs:
  # lint deliberately does not gate test: that serialises a fast job in front of a slow
  # one for no correctness gain. They race; both must pass.
  lint:
    name: Lint
    uses: ./.github/workflows/ci-lint.yml

  test:
    name: Test
    uses: ./.github/workflows/ci-test.yml

  audit:
    name: Audit
    uses: ./.github/workflows/ci-audit.yml

  build:
    name: Build
    if: github.ref == 'refs/heads/main'
    needs: [lint, test]
    uses: ./.github/workflows/ci-build.yml

  # The one required status check — point branch protection at this, not the suites.
  # A skipped job (build on a PR) must not fail it; a failed or cancelled one must.
  # `audit` is advisory and swallows its own failure, so it can only report success.
  ci-status:
    name: CI status
    if: always()
    needs: [lint, test, audit, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check that no required job failed
        env:
          RESULTS: ${{ toJson(needs) }}
        run: |
          echo "$RESULTS"
          bad=$(echo "$RESULTS" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(','.join(k for k, v in data.items() if v['result'] not in ('success', 'skipped')))
          ")
          if [ -n "$bad" ]; then
            echo "::error::Failing or cancelled jobs: $bad"
            exit 1
          fi
