services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: singularity
      POSTGRES_PASSWORD: singularity
      POSTGRES_DB: singularity
    ports: ["${PG_PORT:-5432}:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U singularity"]
      interval: 2s
      timeout: 2s
      retries: 15

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes  # with acks_late the queue IS durability (04)
    ports: ["${REDIS_PORT:-6379}:6379"]
    volumes: [redisdata:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15

volumes:
  pgdata:
  redisdata:
